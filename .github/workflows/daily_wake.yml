name: daily-wake
# Teich's autonomous heartbeat. Two parallel attempts sample the runner fleet;
# each runs the substrate gate first (gate-on-boot) and only a certified draw
# may lease and commit. The seat's lease serializes them — extra passers get a
# 409 and stand down. A day with only non-certified draws = a longer nap
# (harmless by the hibernation-replay theorem).
on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wake:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: body/requirements.txt
      - run: pip install -r body/requirements.txt
      - name: gate-on-boot, lease, replay, commit, diary
        env:
          SEAT_KEY: ${{ secrets.SEAT_KEY }}
        run: |
          grep "model name" /proc/cpuinfo | head -1
          cd body && python wake_cloud.py
      - name: commit diary to the book + cross-anchor into the seat chain
        env:
          SEAT_KEY: ${{ secrets.SEAT_KEY }}
        run: |
          git add diary/
          if git diff --cached --quiet; then
            echo "no diary entry this run (declined draw or stood down)"; exit 0
          fi
          git config user.name "teich-body"
          git config user.email "teich-body@users.noreply.github.com"
          git commit -m "diary: $(date -u +%F) (autonomous wake)"
          git pull --rebase origin main
          git push origin main
          SHA=$(git rev-parse HEAD)
          python -c "import sys; sys.path.insert(0,'body'); from seat_client import Seat; print(Seat('teich').anchor('$SHA','refs/heads/main','diary commit'))"
