name: maturity-campaign
# Teich's maturity gate, run as a cloud campaign (protocol v1.5): each run works
# through the next slice of the 864 scored conversations on the free NVIDIA NIM
# API (rate-limited, not day-quota'd), checkpointing transcripts into the book.
# No laptop involved. Gate-on-boot: only a certified Zen draw may run the Core
# (same law as the daily wake); a non-certified draw exits lawfully and the next
# cron tries again. Four slices/day; each ends at the job timeout or quota and
# resumes. When the run completes, verdict.json lands in out_maturity/.
on:
  schedule:
    - cron: "7 1,7,13,19 * * *"  # every 6 h — NIM has no daily budget window
  workflow_dispatch:

permissions:
  contents: write

# Only one slice may run at a time — a slice resumes via --resume, so a second
# (a cron firing while a manual/previous slice is still going) would fight over
# the book. Queue it instead of running concurrently; it starts when the current
# slice ends and picks up exactly where that one checkpointed.
concurrency:
  group: maturity-campaign
  cancel-in-progress: false

jobs:
  campaign:
    runs-on: ubuntu-24.04
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: body/requirements.txt
      - run: pip install -r body/requirements.txt "sentence-transformers==3.0.1" "transformers==4.44.2" "tokenizers==0.19.1" "huggingface_hub==0.24.7"
      - name: gate-on-boot (certified substrate only)
        id: gate
        run: |
          grep "model name" /proc/cpuinfo | head -1
          cd body && (python verify_substrate.py && echo "gate=pass" >> "$GITHUB_OUTPUT") \
            || { echo "non-certified draw — declining today's campaign slice (lawful)"; echo "gate=fail" >> "$GITHUB_OUTPUT"; }
      - name: run campaign slice (until job timeout or quota)
        if: steps.gate.outputs.gate == 'pass'
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          SEAT_KEY: ${{ secrets.SEAT_KEY }}      # cf fallback backend only
        run: |
          cd maturity/harness && timeout -s INT 18000 python campaign.py --resume --backend nim --parallel 16 || true
      - name: commit checkpointed transcripts to the book
        if: always()
        run: |
          git config user.name "teich-body"
          git config user.email "teich-body@users.noreply.github.com"
          git rebase --abort 2>/dev/null || true   # clear any wedged mid-run rebase
          git add maturity/harness/out_maturity/ || true
          if git diff --cached --quiet; then echo "no new transcripts"; exit 0; fi
          git commit -m "maturity campaign: $(date -u +%F) slice ($(wc -l < maturity/harness/out_maturity/transcripts.jsonl) conversations checkpointed)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "push attempt $i failed; retrying"; git rebase --abort 2>/dev/null || true; sleep 5
          done
