name: substrate-gate
# Pre-registered audition: may GitHub Actions runners lawfully run Teich's body?
# PASS criterion: bit-identical canonical replay vs the certified substrate reference
# (body/substrate_reference.json). Three parallel draws sample runner hardware variance.
on:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        draw: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: body/requirements.txt
      - run: pip install -r body/requirements.txt
      - name: run substrate gate
        run: |
          grep "model name" /proc/cpuinfo | head -1
          cd body && python verify_substrate.py --json-out ../gate_draw${{ matrix.draw }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-draw-${{ matrix.draw }}
          path: gate_draw${{ matrix.draw }}.json
